name: Frontend CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build-lint-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'
                cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Lint check
              run: npm run lint

            - name: Run tests
              run: npm run test

            - name: Build
              run: npm run build